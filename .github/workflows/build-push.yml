# =============================================================================
# GIS Routing Module - GitHub Actions CI/CD
# =============================================================================
# On push to main or a version tag:
#   1. Type-check frontend + run backend tests
#   2. Build the IIFE bundle (dist/nkz-module.js) — uploaded as artifact
#   3. Build and push the backend Docker image to GHCR (if module has a backend)
#
# CI deploys the frontend bundle to MinIO with immutable versioned paths.
# =============================================================================

name: Build and Push

on:
    push:
        branches:
            - main
        tags:
            - "v*"
    pull_request:
        branches:
            - main

env:
    REGISTRY: ghcr.io
    BACKEND_IMAGE: ghcr.io/${{ github.repository }}/nkz-module-gis-routing-backend

jobs:
    # ==========================================================================
    # Test
    # ==========================================================================
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm run typecheck

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"
                  cache-dependency-path: backend/requirements.txt

            - name: Install system dependencies (GIS)
              run: sudo apt-get update -qq && sudo apt-get install -y -qq libgeos-dev libproj-dev

            - name: Install backend dependencies
              run: pip install -r backend/requirements.txt

            - name: Run backend tests
              run: cd backend && python -m pytest tests/ -v

    # ==========================================================================
    # Build IIFE bundle
    # ==========================================================================
    build-module:
        name: Build IIFE Bundle
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build module bundle
              run: pnpm run build:module
              env:
                NKZ_VERSION_HASH: ${{ github.sha }}

            - name: Upload bundle artifact
              uses: actions/upload-artifact@v4
              with:
                  name: nkz-module
                  path: dist/nkz-module.js
                  retention-days: 30

            - name: Check MinIO Secrets
              id: check_secrets
              if: github.event_name != 'pull_request'
              run: |
                  if [ -n "${{ secrets.MINIO_ROOT_USER }}" ] && [ -n "${{ secrets.MINIO_ROOT_PASSWORD }}" ] && [ -n "${{ secrets.MINIO_URL }}" ]; then
                    echo "has_secrets=true" >> $GITHUB_OUTPUT
                  else
                    echo "has_secrets=false" >> $GITHUB_OUTPUT
                  fi

            - name: Setup MinIO Client
              if: steps.check_secrets.outputs.has_secrets == 'true' && github.event_name != 'pull_request'
              run: |
                  curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
                  chmod +x /usr/local/bin/mc

            - name: Upload to MinIO (versioned)
              if: steps.check_secrets.outputs.has_secrets == 'true' && github.event_name != 'pull_request'
              run: |
                  SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
                  mc alias set nkz "${{ secrets.MINIO_URL }}" "${{ secrets.MINIO_ROOT_USER }}" "${{ secrets.MINIO_ROOT_PASSWORD }}"
                  mc cp --recursive ./dist/ "nkz/nekazari-frontend/modules/gis-routing/${SHORT_SHA}/"
                  mc anonymous set public "nkz/nekazari-frontend/modules/gis-routing/${SHORT_SHA}/"

            - name: Activate version
              if: steps.check_secrets.outputs.has_secrets == 'true' && github.event_name != 'pull_request'
              run: |
                  SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
                  curl -s -X POST "${{ secrets.API_URL }}/api/modules/gis-routing/deploy" \
                    -H "Content-Type: application/json" \
                    -H "X-Internal-Token: ${{ secrets.NKZ_INTERNAL_TOKEN }}" \
                    -d "{\"version\": \"${SHORT_SHA}\"}" \
                    || echo "WARNING: deploy activation failed (API may not support /deploy yet)"

    # ==========================================================================
    # Build and push backend Docker image
    # ==========================================================================
    build-backend:
        name: Build Backend Image
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name != 'pull_request'
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for Backend
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.BACKEND_IMAGE }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix=

            - name: Build and push Backend image
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  file: ./backend/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
