# =============================================================================
# GIS Routing Module - GitHub Actions CI/CD
# =============================================================================
# On push to main or a version tag:
#   1. Type-check frontend + run backend tests (inside the F2C image)
#   2. Build the MF2 remote bundle (dist/) — uploaded as an artifact
#   3. Build and push the backend Docker image to GHCR
#   4. Publish the MF2 remote to the platform (main only) via the canonical
#      reusable workflow (_publish-module.yml).
#
# ArgoCD deploys the backend image once k8s/backend-deployment.yaml is
# digest-bumped.
# =============================================================================

name: Build and Push

on:
    push:
        branches:
            - main
        tags:
            - "v*"
    pull_request:
        branches:
            - main

env:
    REGISTRY: ghcr.io
    BACKEND_IMAGE: ghcr.io/${{ github.repository }}/nkz-module-gis-routing-backend

jobs:
    # ==========================================================================
    # Test
    # ==========================================================================
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm run typecheck

            # Fields2Cover is built from source inside the image (no pip wheel),
            # so backend tests run inside the built image rather than on a bare
            # runner. This also exercises the production F2C build on every PR.
            - name: Build backend image (compiles Fields2Cover)
              run: docker build --tag gis-routing-backend:ci ./backend

            - name: Run backend tests in image
              run: >-
                docker run --rm -v "${{ github.workspace }}/backend":/app -w /app
                gis-routing-backend:ci python -m pytest -q

    # ==========================================================================
    # Build IIFE bundle
    # ==========================================================================
    build-module:
        name: Build IIFE Bundle
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build module bundle
              run: pnpm run build:module
              env:
                NKZ_VERSION_HASH: ${{ github.sha }}

            - name: Upload bundle artifact
              uses: actions/upload-artifact@v4
              with:
                  name: nkz-module
                  path: dist/
                  retention-days: 30

            # NOTE: Frontend deployment is intentionally NOT performed here.
            # The canonical mechanism is a flat MinIO overwrite via
            # scripts/deploy-module.sh, run against the cluster MinIO. The
            # previous CI MinIO upload/activate steps were non-functional
            # (secrets absent; the activate endpoint requires PlatformAdmin +
            # upload_id, not a CI token + version) and have been removed.

    # ==========================================================================
    # Build and push backend Docker image
    # ==========================================================================
    build-backend:
        name: Build Backend Image
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name != 'pull_request'
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for Backend
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.BACKEND_IMAGE }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix=

            - name: Build and push Backend image
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  file: ./backend/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  # NOTE: After this image is pushed, prod is NOT updated until
                  # k8s/backend-deployment.yaml is pinned to the new digest via a
                  # PR (see README → Deployment). Auto-PR digest-bump was declined
                  # to keep the org-wide "Actions can create PRs" policy disabled.

    # ==========================================================================
    # Publish MF2 remote (main only) via platform canonical workflow
    # ==========================================================================
    publish-module:
        name: Publish Module
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: nkz-os/nkz/.github/workflows/_publish-module.yml@main
        with:
            module_id: nkz-module-gis-routing
            build_cmd: pnpm run build:module
        secrets:
            ENTITY_MANAGER_URL: ${{ secrets.ENTITY_MANAGER_URL }}
            INTERNAL_SERVICE_SECRET: ${{ secrets.INTERNAL_SERVICE_SECRET }}
