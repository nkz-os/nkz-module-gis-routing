# =============================================================================
# GIS Routing Backend Deployment
# =============================================================================
# Backend API service for GIS Routing module
# =============================================================================

---
# Deployment: GIS Routing Backend Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkz-module-gis-routing-backend
  namespace: nekazari
  labels:
    app: nkz-module-gis-routing-backend
    component: backend
    module: nkz-module-gis-routing
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nkz-module-gis-routing-backend
  template:
    metadata:
      labels:
        app: nkz-module-gis-routing-backend
        component: backend
        module: nkz-module-gis-routing
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          image: ghcr.io/nkz-os/nkz-module-gis-routing/nkz-module-gis-routing-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_NAME
              value: "GIS Routing"
            - name: APP_VERSION
              value: "2.0.0"
            - name: DEBUG
              value: "false"
            - name: API_PREFIX
              value: "/api/routing"
            # CORS — explicit origin whitelist (never *)
            - name: CORS_ORIGINS
              value: '["https://nekazari.robotika.cloud"]'
            # Keycloak Configuration
            - name: KEYCLOAK_URL
              value: "https://auth.robotika.cloud/auth"  # Override per environment
            - name: KEYCLOAK_REALM
              value: "nekazari"
            - name: JWT_AUDIENCE
              value: "account"
            # Service-to-service auth (optional)
            - name: MODULE_MANAGEMENT_KEY
              valueFrom:
                secretKeyRef:
                  name: module-secrets
                  key: management-key
                  optional: true
            - name: CONTEXT_URL
              value: "http://api-gateway-service:5000/ngsi-ld-context.json"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: connection-string
                  optional: true
            - name: MINIO_ENDPOINT
              value: "minio-service:9000"
            - name: MINIO_BUCKET
              value: "nekazari-gis-routing"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
                  optional: true
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
