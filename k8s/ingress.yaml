---
# Traefik IngressRoute for GIS Routing Backend API
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nkz-module-gis-routing-ingress
  namespace: nekazari
  labels:
    app: nkz-module-gis-routing-backend
    module: nkz-module-gis-routing
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`nekazari.robotika.cloud`) && PathPrefix(`/api/routing`)
      priority: 20
      services:
        - name: nkz-module-gis-routing-service
          port: 8000
      middlewares:
        - name: auth-middleware
  tls:
    certResolver: le
